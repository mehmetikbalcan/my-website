<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şiirler - Mehmet İkbal Can</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Mehmet İkbal Can</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Anasayfa</a></li>
                <li><a href="makaleler.html">Makaleler</a></li>
                <li><a href="roportajlar.html">Röportajlar</a></li>
                <li><a href="siirler.html">Şiirler</a></li>
                <li><a href="projeler.html">Projeler</a></li>
                <li><a href="iletisim.html">İletişim</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="content-section">
            <h2 class="siirler-intro-text">Karanlık yeterince etrafı sarmamışsa gün doğmaz</h2>
            <div id="poems-container"></div>
        </section>
    </main>

    <footer>
        <div style="display: flex; justify-content: space-between;">
            <p style="font-style: italic; font-weight: 200; font-size: 1.2rem;">Sadece Sevgi</p>
            <p>&copy; 2024 Mehmet İkbal Can. Tüm hakları saklıdır.</p>
        </div>
    </footer>

    <script>
        // Fetch and display the poems
        fetch('poems.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('poems-container');
                
                data.forEach(poem => {
                    const poemDiv = document.createElement('div');
                    poemDiv.classList.add('poem');
                    
                    // Create poem structure
                    poemDiv.innerHTML = `
                        <h3>${poem.title}</h3>
                        <img src="${poem.image}" alt="${poem.title}" style="max-width: 300px; height: auto;">
                        <p>${poem.content}</p>
                        <p><strong>Writer:</strong> ${poem.writer} <br><strong>Date Published:</strong> ${poem.date}</p>
                    `;
                    
                    // Append the poem to the container
                    container.appendChild(poemDiv);
                });
            });
    </script>
</body>
</html>
